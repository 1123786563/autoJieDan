# Docker Compose configuration for Automaton + Nanobot dual-system deployment
# Version: 1.0.0
# Updated: 2026-02-26

services:
  # ============================================================================
  # Automaton - TypeScript AI Agent Runtime
  # ============================================================================
  automaton:
    build:
      context: ./automaton
      dockerfile: Dockerfile
    image: automaton:${AUTOMATON_VERSION:-latest}
    container_name: automaton
    hostname: automaton
    restart: unless-stopped

    ports:
      - "${AUTOMATON_HTTP_PORT:-18790}:18790"  # HTTP API
      - "${AUTOMATON_WS_PORT:-18791}:18791"    # WebSocket

    environment:
      # Node environment
      - NODE_ENV=production

      # Interagent configuration
      - INTERAGENT_ENABLED=${INTERAGENT_ENABLED:-true}
      - INTERAGENT_HTTP_PORT=18790
      - INTERAGENT_WS_PORT=18791
      - INTERAGENT_SECRET=${INTERAGENT_SECRET:?INTERAGENT_SECRET is required}

      # Optional: LLM configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # Optional: Blockchain configuration
      - AUTOMATON_PRIVATE_KEY=${AUTOMATON_PRIVATE_KEY:-}
      - BASE_RPC_URL=${BASE_RPC_URL:-}

    volumes:
      # Persistent data storage
      - automaton-data:/root/.automaton/data
      - automaton-keys:/root/.automaton/keys
      # Optional: Mount config file
      - ${AUTOMATON_CONFIG_PATH:-./automaton/config.yml}:/root/.automaton/config.yml:ro

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:18790/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - interagent-net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Nanobot - Python AI Assistant Framework
  # ============================================================================
  nanobot:
    build:
      context: ./nanobot
      dockerfile: Dockerfile
    image: nanobot:${NANOBOT_VERSION:-latest}
    container_name: nanobot
    hostname: nanobot
    restart: unless-stopped

    ports:
      - "${NANOBOT_HTTP_PORT:-18792}:18791"  # HTTP API (mapped to 18792)
      # Note: WebSocket uses same port

    environment:
      # Interagent configuration
      - INTERAGENT_ENABLED=${INTERAGENT_ENABLED:-true}
      - INTERAGENT_HTTP_PORT=18791
      - INTERAGENT_AUTOMATON_URL=http://automaton:18790
      - INTERAGENT_SECRET=${INTERAGENT_SECRET:?INTERAGENT_SECRET is required}

      # Optional: LLM configuration
      - NANOBOT_LLM_PROVIDER=${NANOBOT_LLM_PROVIDER:-openai}
      - NANOBOT_API_KEY=${NANOBOT_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # Optional: Messaging platforms
      - NANOBOT_TELEGRAM_TOKEN=${NANOBOT_TELEGRAM_TOKEN:-}
      - NANOBOT_SLACK_TOKEN=${NANOBOT_SLACK_TOKEN:-}

    volumes:
      # Persistent data storage
      - nanobot-data:/root/.nanobot
      # Optional: Mount config file
      - ${NANOBOT_CONFIG_PATH:-./nanobot/config.yml}:/root/.nanobot/config.yml:ro

    depends_on:
      automaton:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18791/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - interagent-net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Prometheus - Metrics Collection
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    hostname: prometheus
    restart: unless-stopped

    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - interagent-net

    profiles:
      - monitoring

  # ============================================================================
  # Grafana - Visualization
  # ============================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    hostname: grafana
    restart: unless-stopped

    ports:
      - "${GRAFANA_PORT:-3000}:3000"

    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=

    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

    depends_on:
      - prometheus

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - interagent-net

    profiles:
      - monitoring

  # ============================================================================
  # Elasticsearch - Log Storage
  # ============================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    hostname: elasticsearch
    restart: unless-stopped

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"

    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    networks:
      - interagent-net

    profiles:
      - logging

  # ============================================================================
  # Logstash - Log Processing
  # ============================================================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash
    hostname: logstash
    restart: unless-stopped

    ports:
      - "${LOGSTASH_TCP_PORT:-5000}:5000/tcp"

    volumes:
      - ./deploy/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./deploy/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro

    depends_on:
      elasticsearch:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9600/_node/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - interagent-net

    profiles:
      - logging

  # ============================================================================
  # Kibana - Log Visualization
  # ============================================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    hostname: kibana
    restart: unless-stopped

    ports:
      - "${KIBANA_PORT:-5601}:5601"

    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false

    depends_on:
      elasticsearch:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - interagent-net

    profiles:
      - logging

# ============================================================================
# Networks
# ============================================================================
networks:
  interagent-net:
    driver: bridge
    name: interagent-network
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ============================================================================
# Volumes
# ============================================================================
volumes:
  automaton-data:
    name: automaton-data
    driver: local

  automaton-keys:
    name: automaton-keys
    driver: local

  nanobot-data:
    name: nanobot-data
    driver: local

  prometheus-data:
    name: prometheus-data
    driver: local

  grafana-data:
    name: grafana-data
    driver: local

  elasticsearch-data:
    name: elasticsearch-data
    driver: local
