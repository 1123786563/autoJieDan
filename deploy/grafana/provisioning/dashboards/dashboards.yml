# Grafana Dashboard Provisioning Configuration
# Version: 1.0.0

apiVersion: 1

providers:
  - name: 'Interagent Dashboards'
    orgId: 1
    folder: 'Interagent'
    folderUid: 'interagent'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
