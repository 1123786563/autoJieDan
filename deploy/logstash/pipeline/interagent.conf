# Logstash Pipeline Configuration for Interagent Logs
# Version: 1.0.0

input {
  # TCP input for JSON logs from Automaton and Nanobot
  tcp {
    port => 5000
    codec => json_lines
    tags => ["interagent", "tcp"]
  }

  # File input for Docker container logs
  file {
    path => "/var/log/containers/*automaton*.log"
    codec => json
    tags => ["interagent", "automaton", "docker"]
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_automaton"
  }

  file {
    path => "/var/log/containers/*nanobot*.log"
    codec => json
    tags => ["interagent", "nanobot", "docker"]
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_nanobot"
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Extract log level
  if [parsed][level] {
    mutate {
      rename => { "[parsed][level]" => "log_level" }
    }
  }

  # Extract timestamp
  if [parsed][time] {
    date {
      match => [ "[parsed][time]", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Extract module name
  if [parsed][module] {
    mutate {
      rename => { "[parsed][module]" => "module" }
    }
  }

  # Extract trace ID for distributed tracing
  if [parsed][traceId] {
    mutate {
      rename => { "[parsed][traceId]" => "trace_id" }
    }
  }

  # Extract task ID
  if [parsed][taskId] {
    mutate {
      rename => { "[parsed][taskId]" => "task_id" }
    }
  }

  # Extract DID
  if [parsed][did] {
    mutate {
      rename => { "[parsed][did]" => "agent_did" }
    }
  }

  # Extract operation
  if [parsed][operation] {
    mutate {
      rename => { "[parsed][operation]" => "operation" }
    }
  }

  # Calculate duration if available
  if [parsed][durationMs] {
    mutate {
      rename => { "[parsed][durationMs]" => "duration_ms" }
    }
  }

  # Handle error objects
  if [parsed][error] {
    mutate {
      rename => { "[parsed][error]" => "error_details" }
    }
  }

  # Add service type based on source
  if "automaton" in [tags] {
    mutate {
      add_field => { "service" => "automaton" }
    }
  } else if "nanobot" in [tags] {
    mutate {
      add_field => { "service" => "nanobot" }
    }
  }

  # Clean up parsed object
  mutate {
    remove_field => ["parsed", "message"]
  }

  # Add geoip (if IP address available)
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }
}

output {
  # Elasticsearch output
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "interagent-%{[service]}-%{+YYYY.MM.dd}"
    template_name => "interagent"
    template_overwrite => true
  }

  # Debug output (uncomment for troubleshooting)
  # stdout {
  #   codec => rubydebug
  # }
}
