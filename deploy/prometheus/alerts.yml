# Prometheus Alert Rules for Interagent System
# Version: 1.0.0

groups:
  - name: interagent_alerts
    rules:
      # Service availability alerts
      - alert: AutomatonDown
        expr: up{job="automaton"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Automaton service is down"
          description: "Automaton has been down for more than 1 minute."

      - alert: NanobotDown
        expr: up{job="nanobot"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Nanobot service is down"
          description: "Nanobot has been down for more than 1 minute."

      # WebSocket connection alerts
      - alert: NoWebSocketConnections
        expr: interagent_ws_connections == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No WebSocket connections"
          description: "There are no active WebSocket connections for 5 minutes."

      # Task processing alerts
      - alert: HighPendingTasks
        expr: interagent_tasks_pending > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of pending tasks"
          description: "There are {{ $value }} pending tasks, which is above the threshold."

      - alert: HighTaskFailureRate
        expr: rate(interagent_tasks_failed_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High task failure rate"
          description: "Task failure rate is {{ $value | humanize }} per second."

      # Latency alerts
      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(interagent_request_latency_ms_bucket[5m])) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency"
          description: "P99 latency is {{ $value | humanize }}ms, which exceeds 500ms."

      # Dead letter queue alerts
      - alert: DeadLetterQueueGrowing
        expr: interagent_dlq_size > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Dead letter queue is growing"
          description: "DLQ size is {{ $value }}, indicating persistent failures."
