# Prometheus Configuration for Automaton + Nanobot
# Version: 1.0.0

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'interagent-monitor'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files (optional)
# rule_files:
#   - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # Automaton metrics
  - job_name: 'automaton'
    static_configs:
      - targets: ['automaton:18790']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # Nanobot metrics (if available)
  - job_name: 'nanobot'
    static_configs:
      - targets: ['nanobot:18791']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s
